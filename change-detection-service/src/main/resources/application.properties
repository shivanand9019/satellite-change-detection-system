
spring.application.name=change-detection-service
server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/satdb
spring.datasource.username=postgres
spring.datasource.password=satpass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.kafka.bootstrap-servers=localhost:9092
# Essential JSON Deserializer properties
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.satellite.change_detection_service.dto.IngestionEvent